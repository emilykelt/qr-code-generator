<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="icon" href="data:," />
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    color: #2a2418;
    background: #f4ead9;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 32px 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* warm gradient blobs in the spirit of image 1 */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.85;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 420px; height: 420px; top: -120px; left: 50%; transform: translateX(-50%);
    background: radial-gradient(circle, #ff7a4d 0%, rgba(255,122,77,0) 70%); }
  .orb-2 { width: 380px; height: 380px; top: 28%; left: -100px;
    background: radial-gradient(circle, #f5c451 0%, rgba(245,196,81,0) 70%); }
  .orb-3 { width: 360px; height: 360px; bottom: 12%; right: -80px;
    background: radial-gradient(circle, #5fb3e6 0%, rgba(95,179,230,0) 70%); }
  .orb-4 { width: 320px; height: 320px; bottom: -60px; left: 22%;
    background: radial-gradient(circle, #8d7fd6 0%, rgba(141,127,214,0) 70%); }

  main {
    position: relative;
    z-index: 1;
    width: min(460px, 100%);
  }

  .title {
    font-family: "Instrument Serif", Georgia, serif;
    font-weight: 400;
    font-size: clamp(40px, 7vw, 56px);
    letter-spacing: -0.01em;
    text-align: center;
    margin: 0 0 8px;
  }
  .subtitle {
    text-align: center;
    margin: 0 0 28px;
    font-size: 14px;
    color: #6b5f48;
    letter-spacing: 0.02em;
  }

  /* glass card */
  .card {
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    background: rgba(255, 255, 255, 0.42);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 28px;
    padding: 24px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 20px 50px -20px rgba(60, 40, 20, 0.25),
      0 6px 20px -10px rgba(60, 40, 20, 0.15);
  }

  .field {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 999px;
    padding: 6px 6px 6px 20px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 8px 20px -12px rgba(60, 40, 20, 0.25);
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .field:focus-within {
    border-color: rgba(255, 255, 255, 1);
    box-shadow:
      0 1px 0 rgba(255,255,255,1) inset,
      0 0 0 4px rgba(141, 127, 214, 0.18),
      0 8px 20px -10px rgba(60, 40, 20, 0.3);
  }

  .field input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font: inherit;
    font-size: 15px;
    color: #2a2418;
    padding: 10px 0;
    min-width: 0;
  }
  .field input::placeholder { color: #9a8e76; }

  .btn {
    border: 0;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    font-size: 14px;
    color: white;
    padding: 12px 22px;
    border-radius: 999px;
    background: linear-gradient(135deg, #8d7fd6 0%, #6b5cc4 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.4) inset,
      0 8px 18px -6px rgba(107, 92, 196, 0.55);
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.06); }
  .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 4px 10px -4px rgba(107, 92, 196, 0.5); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .error {
    margin: 14px 4px 0;
    font-size: 13px;
    color: #b04a3a;
    min-height: 1em;
  }

  /* result panel */
  .result {
    margin-top: 22px;
    padding: 24px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 12px 30px -16px rgba(60, 40, 20, 0.25);
    display: none;
    text-align: center;
    animation: rise 0.35s ease both;
  }
  .result.show { display: block; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .qr-wrap {
    display: inline-block;
    padding: 16px;
    border-radius: 18px;
    background: white;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      8px 8px 20px rgba(60, 40, 20, 0.08),
      -6px -6px 16px rgba(255, 255, 255, 0.9);
  }
  .qr-wrap img { display: block; width: 260px; height: 260px; image-rendering: pixelated; }

  .url-readout {
    margin: 14px auto 0;
    max-width: 100%;
    font-size: 12px;
    color: #6b5f48;
    word-break: break-all;
  }

  .actions {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.7);
    color: #4a3f2e;
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.9) inset,
      0 6px 14px -8px rgba(60, 40, 20, 0.25);
  }

  footer {
    margin-top: 22px;
    text-align: center;
    font-size: 12px;
    color: #8a7d65;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <main>
    <h1 class="title">QR Generator</h1>
    <p class="subtitle">Paste a public URL and generate a scannable code.</p>

    <section class="card">
      <form id="form" novalidate>
        <div class="field">
          <input
            id="url"
            type="url"
            inputmode="url"
            autocomplete="url"
            placeholder="https://example.com"
            spellcheck="false"
            required
          />
          <button class="btn" type="submit">Generate</button>
        </div>
        <div class="error" id="error" aria-live="polite"></div>
      </form>

      <div class="result" id="result">
        <div class="qr-wrap"><img id="qr" alt="Generated QR code" /></div>
        <div class="url-readout" id="readout"></div>
        <div class="actions">
          <button class="btn btn-ghost" id="download" type="button">Download PNG</button>
          <button class="btn btn-ghost" id="copy" type="button">Copy URL</button>
        </div>
      </div>
    </section>

    <footer>Codes are generated locally in your browser.</footer>
  </main>

<script>
  const form = document.getElementById("form");
  const urlInput = document.getElementById("url");
  const errorEl = document.getElementById("error");
  const result = document.getElementById("result");
  const qrImg = document.getElementById("qr");
  const readout = document.getElementById("readout");
  const downloadBtn = document.getElementById("download");
  const copyBtn = document.getElementById("copy");

  let lastUrl = "";
  let lastDataUrl = "";

  function normalize(raw) {
    const v = raw.trim();
    if (!v) return "";
    if (/^https?:\/\//i.test(v)) return v;
    return "https://" + v;
  }

  function isValidHttpUrl(value) {
    try {
      const u = new URL(value);
      return u.protocol === "http:" || u.protocol === "https:";
    } catch {
      return false;
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    errorEl.textContent = "";
    const url = normalize(urlInput.value);
    if (!isValidHttpUrl(url)) {
      errorEl.textContent = "Please enter a valid URL.";
      result.classList.remove("show");
      return;
    }
    try {
      // typeNumber 0 = auto-pick, errorCorrectionLevel "M"
      const qr = qrcode(0, "M");
      qr.addData(url);
      qr.make();
      lastDataUrl = qr.createDataURL(8, 2); // cellSize=8px, margin=2 modules
      qrImg.src = lastDataUrl;
      lastUrl = url;
      readout.textContent = url;
      result.classList.add("show");
    } catch (err) {
      errorEl.textContent = "Could not generate a QR code for that input.";
      result.classList.remove("show");
    }
  });

  downloadBtn.addEventListener("click", () => {
    if (!lastDataUrl) return;
    const link = document.createElement("a");
    link.download = "qr-code.png";
    link.href = lastDataUrl;
    link.click();
  });

  copyBtn.addEventListener("click", async () => {
    if (!lastUrl) return;
    try {
      await navigator.clipboard.writeText(lastUrl);
      const original = copyBtn.textContent;
      copyBtn.textContent = "Copied";
      setTimeout(() => (copyBtn.textContent = original), 1200);
    } catch {
      /* clipboard unavailable */
    }
  });
</script>
</body>
</html>
